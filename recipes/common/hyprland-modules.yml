modules:
    - type: rpm-ostree
      install:
        - hyprland
        - kitty
        - waybar
        - xdg-desktop-portal-gtk
        - hyprpaper
        - hypridle
        - hyprlock
        - hyprpolkitagent
        - hyprshot
        - uwsm
        - nwg-look
        - nwg-displays
        - sbctl
        - nautilus-open-any-terminal       

    - type: files
      files:
        - source: system/hyprland
          destination: /

    - type: script
      scripts:
        - removeunprofessionalwallpapers.sh
        - sethyprlandwaybarmodules.sh
