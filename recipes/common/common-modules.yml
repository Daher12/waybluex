modules:
    - type: containerfile
      snippets:
        - COPY --from=ghcr.io/ublue-os/akmods:main-42 /rpms /tmp/rpms
        - COPY --from=ghcr.io/ublue-os/akmods:main-42 /kernel-rpms /tmp/rpms/kernel
        - RUN find /tmp/rpms
        - RUN rpm -q ublue-os-akmods-addons || rpm-ostree install /tmp/rpms/ublue-os/ublue-os-akmods-addons*.rpm
    - type: script
      scripts:
        - installsignedkernel.sh

    - type: rpm-ostree
      install:
        - just
        - powerstat

    - type: rpm-ostree
      repos:
        - https://copr.fedorainfracloud.org/coprs/ublue-os/packages/repo/fedora-%OS_VERSION%/ublue-os-packages-fedora-%OS_VERSION%.repo
      install:
        - ublue-os-udev-rules
        - ublue-os-update-services
        - ublue-os-signing
        - ublue-os-luks
        - ublue-os-just


    - type: script
      scripts:
        - installandroidudev.sh
        - ensureautoupdates.sh
        - fixupstreamicdloaderbug.sh
        - addimageinfo.sh
        - copr.sh

    - type: rpm-ostree
      install:
      # launcher
        - rofi-wayland

      # environment
        - tlp
        - fish
        - newt
        - xorg-x11-server-Xwayland
        - polkit
        - xdg-user-dirs
        - dbus-tools
        - dbus-daemon
        - wl-clipboard
        - playerctl
        - qt5-qtwayland
        - qt6-qtwayland
        - vulkan-validation-layers
        - vulkan-tools
        - google-noto-emoji-fonts
        - openssl
        - just
        - alsa-firmware
        - p7zip
        
      # sound
        - wireplumber
        - pipewire

      # networking
        - iwd
        - bluez
        - bluez-tools
        - blueman

      # file manager
        - nautilus
        - android-tools

      # display
        - brightnessctl

      # notifications
        - dunst

      # theme and GUI
        - fontawesome-fonts-all
        - gnome-themes-extra
        - hyprland
        - xdg-desktop-portal-gtk
        - hyprpaper
        - hypridle
        - hyprlock
        - hyprpolkitagent
        - hyprshot
        - uwsm
        - nwg-look
        - nwg-displays
        - sbctl
        - nautilus-open-any-terminal       

    - type: script
      scripts:
        - installproprietarypackages.sh
        - tailscale.sh
        - custom.sh

    - type: rpm-ostree
      install:
        - heif-pixbuf-loader
        - ffmpeg
        - ffmpeg-libs
        - ffmpegthumbnailer
        - pipewire-libs-extra
        - libfdk-aac
        - gstreamer1-plugins-ugly 
      remove:
        - gstreamer1-plugins-ugly-free
        - fdk-aac-free
        - ffmpeg-free
        - libavcodec-free  
        - libavdevice-free
        - libavfilter-free
        - libavformat-free  
        - libavutil-free  
        - libpostproc-free  
        - libswresample-free  
        - libswscale-free  

    - type: script
      scripts:
        - installrpmfusion.sh
        - removeunusedrepos.sh

    - type: files
      files:
        - source: system/usr
          destination: /usr
        - source: system/etc
          destination: /etc

    - type: gschema-overrides
      include:
        - zz1-wayblue-theming.gschema.override

    - type: script
      scripts:
        - settheming.sh
        - addbrewjustimport.sh

    - type: wayblue-signing
      source: local
